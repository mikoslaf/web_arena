      <div class="lobby-inner">

        <!-- Header -->
        <h1 class="game-title">ARENA</h1>
        <p class="game-subtitle">Przeżyj. Walcz. Zdobywaj punkty.</p>

        <!-- Status -->
        <p id="lobbyStatus" class="lobby-status lobby-status--muted">Łączenie z serwerem…</p>

        <!-- Player setup -->
        <div class="lobby-form">
          <div class="form-group">
            <label class="form-label" for="playerNameInput">Twój pseudonim</label>
            <input id="playerNameInput" class="form-input" type="text" placeholder="Gracz" maxlength="24"
              autocomplete="off" />
          </div>
          <div class="form-group">
            <label class="form-label" for="roomNameInput">Nazwa pokoju (opcjonalnie)</label>
            <input id="roomNameInput" class="form-input" type="text" placeholder="Mój pokój" maxlength="32"
              autocomplete="off" />
          </div>
          <button id="createRoomBtn" class="btn btn--primary">+ UTWÓRZ POKÓJ</button>
        </div>

        <!-- Divider -->
        <div class="lobby-divider">
          <span>lub dołącz do istniejącego</span>
        </div>

        <!-- Room list -->
        <div class="room-list-wrapper">
          <div class="room-list-header">
            <span class="room-list-title">Dostępne pokoje</span>
            <span class="room-list-hint">Odświeżane automatycznie</span>
          </div>
          <div id="roomList" class="room-list">
            <p class="lobby-empty">Ładowanie…</p>
          </div>
        </div>

        <!-- Controls hint -->
        <div class="controls-grid">
          <div class="ctrl"><span class="key">W A S D</span><span>Ruch</span></div>
          <div class="ctrl"><span class="key">SPACJA</span><span>Strzał</span></div>
        </div>
        <!-- Author footer -->
        <div class="lobby-author">
          <span>Autor: <a href="https://github.com/mikoslaf" target="_blank" rel="noopener" class="author-link">Mikołaj
              Wójcik</a></span>
        </div>

      </div>
    </div>

    <!-- ── Game Canvas ───────────────────────────────────────────────────── -->
    <canvas id="gameCanvas" style="display:none;"></canvas>

  </div>
