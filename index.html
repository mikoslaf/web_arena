<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arena – 2D Browser Game</title>
  <meta name="description" content="Przeglądarkowa gra akcji 2D. Walcz z potworami i przetrwaj jak najdłużej na arenie!" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">

    <!-- ── Lobby Screen ──────────────────────────────────────────────────── -->
    <div id="lobbyScreen">
      <div class="lobby-inner">

        <!-- Header -->
        <h1 class="game-title">ARENA</h1>
        <p class="game-subtitle">Przeżyj. Walcz. Zdobywaj punkty.</p>

        <!-- Status -->
        <p id="lobbyStatus" class="lobby-status lobby-status--muted">Łączenie z serwerem…</p>

        <!-- Player setup -->
        <div class="lobby-form">
          <div class="form-group">
            <label class="form-label" for="playerNameInput">Twój pseudonim</label>
            <input
              id="playerNameInput"
              class="form-input"
              type="text"
              placeholder="Gracz"
              maxlength="24"
              autocomplete="off"
            />
          </div>
          <div class="form-group">
            <label class="form-label" for="roomNameInput">Nazwa pokoju (opcjonalnie)</label>
            <input
              id="roomNameInput"
              class="form-input"
              type="text"
              placeholder="Mój pokój"
              maxlength="32"
              autocomplete="off"
            />
          </div>
          <button id="createRoomBtn" class="btn btn--primary">+ UTWÓRZ POKÓJ</button>
        </div>

        <!-- Divider -->
        <div class="lobby-divider">
          <span>lub dołącz do istniejącego</span>
        </div>

        <!-- Room list -->
        <div class="room-list-wrapper">
          <div class="room-list-header">
            <span class="room-list-title">Dostępne pokoje</span>
            <span class="room-list-hint">Odświeżane automatycznie</span>
          </div>
          <div id="roomList" class="room-list">
            <p class="lobby-empty">Ładowanie…</p>
          </div>
        </div>

        <!-- Controls hint -->
        <div class="controls-grid">
          <div class="ctrl"><span class="key">W A S D</span><span>Ruch</span></div>
          <div class="ctrl"><span class="key">SPACJA</span><span>Strzał</span></div>
        </div>
      </div>
    </div>

    <!-- ── Game Canvas ───────────────────────────────────────────────────── -->
    <canvas id="gameCanvas" style="display:none;"></canvas>

  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
